elf_version: "1.0.0"
subject_id_col: patient_id

medication_admin_intermittent:
  medication:
    code:
      - MED_INT
      - col(med_category)
      - col(med_dose_unit)
      - col(mar_action_category)
    time: col(admin_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: med_dose
    med_route_category: med_route_category
    hospitalization_id: hospitalization_id
