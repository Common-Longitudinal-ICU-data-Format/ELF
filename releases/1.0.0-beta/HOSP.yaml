elf_version: "1.0.0"
subject_id_col: patient_id

hospitalization:
  admission:
    code:
      - HOSP
      - admission_type
      - col(admission_type_category)
    time: col(admission_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: admission_type_name
    hospitalization_id: hospitalization_id

  discharge:
    code:
      - HOSP
      - discharge_category
      - col(discharge_category)
    time: col(discharge_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: discharge_name
    hospitalization_id: hospitalization_id

  age_charted:
    code: HOSP//age_charted
    time: col(admission_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: age_at_admission
    hospitalization_id: hospitalization_id
