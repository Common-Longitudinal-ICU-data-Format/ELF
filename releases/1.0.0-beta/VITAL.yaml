elf_version: "1.0.0"
subject_id_col: patient_id

outlier_shaping:
  enabled: true
  category_col: vital_category
  limits:
    height_cm: [30, 96]
    weight_kg: [30, 1100]
    sbp: [0, 300]
    dbp: [0, 200]
    map: [0, 250]
    heart_rate: [0, 300]
    respiratory_rate: [0, 60]
    spo2: [50, 100]
    temp_c: [32, 44]

vitals:
  vital:
    code:
      - VITAL
      - col(vital_category)
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: vital_value
    hospitalization_id: hospitalization_id
