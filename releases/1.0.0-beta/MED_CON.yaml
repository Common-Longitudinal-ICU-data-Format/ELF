elf_version: "1.0.0"
subject_id_col: patient_id

medication_admin_continuous:
  medication:
    code:
      - MED_CON
      - col(med_category)
      - col(med_dose_unit_converted)
      - col(mar_action_category)
    time: col(admin_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: med_dose_converted
    med_dose_unit: med_dose_unit
    med_route_category: med_route_category
    hospitalization_id: hospitalization_id

    unit_conversion:
      enabled: true
      override: true
      preferred_units:
        amiodarone: mg/min
        angiotension: ng/kg/min
        cisatracurium: mcg/kg/min
        dexmedetomidine: mcg/kg/hr
        diltiazem: mg/hr
        dobutamine: mcg/kg/min
        dopamine: mcg/kg/min
        epinephrine: mcg/kg/min
        esmolol: mcg/kg/min
        fentanyl: mcg/kg/hr
        hydromorphone: mg/hr
        ketamine: mcg/kg/hr
        labetalol: mg/min
        lidocaine: mg/min
        lorazepam: mg/hr
        midazolam: mg/hr
        milrinone: mcg/kg/min
        nicardipine: mg/hr
        nitroprusside: mcg/kg/min
        norepinephrine: mcg/kg/min
        pentobarbital: mcg/kg/hr
        phenylephrine: mcg/kg/min
        procainamide: mg/min
        propofol: mcg/kg/min
        remifentanil: mcg/kg/min
        rocuronium: mcg/kg/min
        vasopressin: u/min
        vecuronium: mcg/kg/min
