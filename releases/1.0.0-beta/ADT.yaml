elf_version: "1.0.0"
subject_id_col: patient_id

adt:
  transfer_in:
    code:
      - ADT
      - TRANSFER_IN
      - col(location_category)
      - col(location_type)
    time: col(in_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    hospitalization_id: hospitalization_id
    text_value: location_name

  transfer_out:
    code:
      - ADT
      - TRANSFER_OUT
      - col(location_category)
      - col(location_type)
    time: col(out_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    hospitalization_id: hospitalization_id
    text_value: location_name
