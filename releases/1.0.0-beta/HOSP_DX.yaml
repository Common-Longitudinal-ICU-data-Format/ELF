elf_version: "1.0.0"
subject_id_col: patient_id

hospital_diagnosis:
  diagnosis:
    code:
      - HOSP_DX
      - col(diagnosis_code_format)
      - col(diagnosis_code)
    time: col(discharge_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    hospitalization_id: hospitalization_id
    diagnosis_primary: diagnosis_primary
    poa_present: poa_present
