elf_version: "1.0.0"
subject_id_col: patient_id

outlier_shaping:
  enabled: true
  limits:
    lpm_set: [0, 60]
    fio2_set: [0.21, 1]
    tidal_volume_set: [100, 3000]
    resp_rate_set: [0, 200]
    pressure_control_set: [-50, 50]
    pressure_support_set: [-50, 50]
    flow_rate_set: [-50, 100]
    peak_inspiratory_pressure_set: [-50, 100]
    inspiratory_time_set: [-1, 50]
    peep_set: [0, 30]
    tidal_volume_obs: [100, 3000]
    resp_rate_obs: [0, 200]
    plateau_pressure_obs: [0, 100]
    peak_inspiratory_pressure_obs: [-50, 100]
    peep_obs: [0, 50]
    minute_vent_obs: [0, 40]
    mean_airway_pressure_obs: [0, 50]

respiratory_support:
  # --- Categorical concepts (3) ---
  device_category:
    code: [RESP, device_category, col(device_category)]
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: device_name
    hospitalization_id: hospitalization_id

  mode_category:
    code: [RESP, mode_category, col(mode_category)]
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: mode_name
    hospitalization_id: hospitalization_id

  tracheostomy:
    code: RESP//tracheostomy
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: tracheostomy
    hospitalization_id: hospitalization_id

  # --- Set parameters (10) ---
  fio2_set:
    code: RESP//fio2_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: fio2_set
    hospitalization_id: hospitalization_id

  lpm_set:
    code: RESP//lpm_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: lpm_set
    hospitalization_id: hospitalization_id

  tidal_volume_set:
    code: RESP//tidal_volume_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: tidal_volume_set
    hospitalization_id: hospitalization_id

  resp_rate_set:
    code: RESP//resp_rate_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: resp_rate_set
    hospitalization_id: hospitalization_id

  pressure_control_set:
    code: RESP//pressure_control_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: pressure_control_set
    hospitalization_id: hospitalization_id

  pressure_support_set:
    code: RESP//pressure_support_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: pressure_support_set
    hospitalization_id: hospitalization_id

  flow_rate_set:
    code: RESP//flow_rate_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: flow_rate_set
    hospitalization_id: hospitalization_id

  peak_inspiratory_pressure_set:
    code: RESP//peak_inspiratory_pressure_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: peak_inspiratory_pressure_set
    hospitalization_id: hospitalization_id

  inspiratory_time_set:
    code: RESP//inspiratory_time_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: inspiratory_time_set
    hospitalization_id: hospitalization_id

  peep_set:
    code: RESP//peep_set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: peep_set
    hospitalization_id: hospitalization_id

  # --- Observed parameters (7) ---
  tidal_volume_obs:
    code: RESP//tidal_volume_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: tidal_volume_obs
    hospitalization_id: hospitalization_id

  resp_rate_obs:
    code: RESP//resp_rate_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: resp_rate_obs
    hospitalization_id: hospitalization_id

  plateau_pressure_obs:
    code: RESP//plateau_pressure_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: plateau_pressure_obs
    hospitalization_id: hospitalization_id

  peak_inspiratory_pressure_obs:
    code: RESP//peak_inspiratory_pressure_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: peak_inspiratory_pressure_obs
    hospitalization_id: hospitalization_id

  peep_obs:
    code: RESP//peep_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: peep_obs
    hospitalization_id: hospitalization_id

  minute_vent_obs:
    code: RESP//minute_vent_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: minute_vent_obs
    hospitalization_id: hospitalization_id

  mean_airway_pressure_obs:
    code: RESP//mean_airway_pressure_obs
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: mean_airway_pressure_obs
    hospitalization_id: hospitalization_id
