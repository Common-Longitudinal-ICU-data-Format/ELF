elf_version: "1.0.0"
subject_id_col: patient_id

patient:
  sex:
    code:
      - PATIENT
      - sex
      - col(sex_category)
    time: null
    text_value: sex_name

  race:
    code:
      - PATIENT
      - race
      - col(race_category)
    time: null
    text_value: race_name

  ethnicity:
    code:
      - PATIENT
      - ethnicity
      - col(ethnicity_category)
    time: null
    text_value: ethnicity_name

  birth:
    code: MEDS_BIRTH
    time: col(birth_date)
    time_format:
      - "%Y-%m-%d %H:%M:%S"
      - "%Y-%m-%d"

  death:
    code: MEDS_DEATH
    time: col(death_dttm)
    time_format:
      - "%Y-%m-%d %H:%M:%S"
      - "%Y-%m-%d"
